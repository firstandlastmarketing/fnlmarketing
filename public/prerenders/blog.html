<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Marketing Blog | First and Last Marketing</title>

  <!-- Canonical -->
  <link rel="canonical" href="https://www.firstandlastmarketing.com/blog" />
  <link rel="preload" as="image" href="https://www.firstandlastmarketing.com/og-images/blog-preview.png" />

  <!-- SEO -->
  <meta name="description" content="Explore expert articles on SEO, automation, web design, and SaaS marketing trends from First and Last Marketing." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="First and Last Marketing" />
  <meta property="og:url" content="https://www.firstandlastmarketing.com/blog" />
  <meta property="og:title" content="Digital Marketing Blog | First and Last Marketing" />
  <meta property="og:description" content="Explore expert articles on SEO, automation, web design, and SaaS marketing trends from First and Last Marketing." />
  <meta property="og:image" content="https://www.firstandlastmarketing.com/og-images/blog-preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Digital Marketing Blog | First and Last Marketing" />
  <meta name="twitter:description" content="Explore expert articles on SEO, automation, web design, and SaaS marketing trends from First and Last Marketing." />
  <meta name="twitter:image" content="https://www.firstandlastmarketing.com/og-images/blog-preview.png" />

  <script>
    // Redirect real users, but not bots (social preview bots or Googlebot)
    const ua = navigator.userAgent;
    const isBot = /bot|crawler|spider|crawling/i.test(ua);

    if (!isBot) {
      window.location.href = '/blog';
    }
  </script>
</head>
<body>
  <p>If you are seeing this, you are likely a crawler or bot. This page helps social media show blog previews correctly.</p>
</body>
</html>
